<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KYC Sentinel - Flagged Alerts</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <div class="logo-icon">🛡️</div>
                    <span class="logo-text">KYC Sentinel</span>
                </div>
            </div>
            
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item">
                    <span class="nav-icon">📊</span>
                    <span>Dashboard</span>
                </a>
                <a href="verifications.html" class="nav-item">
                    <span class="nav-icon">✓</span>
                    <span>Verifications</span>
                </a>
                <a href="alerts.html" class="nav-item active">
                    <span class="nav-icon">⚠️</span>
                    <span>Flagged Alerts</span>
                </a>
                <a href="verification_flow.html" class="nav-item" style="display: flex !important;">
                    <span class="nav-icon">🔄</span>
                    <span>New KYC Flow</span>
                </a>
                <a href="analytics.html" class="nav-item">
                    <span class="nav-icon">📈</span>
                    <span>Analytics</span>
                </a>
                <a href="settings.html" class="nav-item">
                    <span class="nav-icon">⚙️</span>
                    <span>Settings</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <!-- WEATHER WIDGET REMOVED -->
                
                <div class="user-info" onclick="window.location.href='dashboard.html'">
                    <div class="user-avatar" id="profileAvatar"></div>
                    <div class="user-details">
                        <span class="user-name" id="profileName"></span>
                        <span class="user-role" id="profileRole"></span>
                    </div>
                </div>
                
                <button class="logout-btn" onclick="logout()">
                    <span>🚪</span> Logout
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <h1>Flagged Alerts</h1>

            <!-- Alerts Stats -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon">⚠️</div>
                    <div class="stat-content">
                        <div class="stat-value" id="highRiskCount">0</div>
                        <div class="stat-label">High Risk</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">🟡</div>
                    <div class="stat-content">
                        <div class="stat-value" id="mediumRiskCount">0</div>
                        <div class="stat-label">Medium Risk</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">🟢</div>
                    <div class="stat-content">
                        <div class="stat-value" id="lowRiskCount">0</div>
                        <div class="stat-label">Low Risk</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">⏳</div>
                    <div class="stat-content">
                        <div class="stat-value" id="pendingReviewCount">0</div>
                        <div class="stat-label">Pending Review</div>
                    </div>
                </div>
            </div>

            <!-- Alerts Table with PREVIOUS INDIAN NAMES -->
            <div class="data-table">
                <table class="kyc-table">
                    <thead>
                        <tr>
                            <th>Alert ID</th>
                            <th>Applicant</th>
                            <th>Risk Level</th>
                            <th>Fraud Type</th>
                            <th>Date</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="alertsTableBody">
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
    <script>
        // Load current user (YOUR USER)
        let currentUser = JSON.parse(localStorage.getItem('currentUser'));
        
        if (!currentUser) {
            window.location.href = 'index.html';
        }

        // Update UI with YOUR user data
        document.getElementById('profileName').textContent = currentUser.name;
        document.getElementById('profileRole').textContent = currentUser.role;
        
        // Generate avatar initials from YOUR name
        const initials = currentUser.name.split(' ').map(n => n[0]).join('').toUpperCase();
        document.getElementById('profileAvatar').textContent = initials;

        // Alert Functions
        function reviewAlert(id) {
            alert('Reviewing alert: ' + id);
        }

        function viewAlert(id) {
            alert('Viewing alert: ' + id);
        }

        function logout() {
            if (confirm('Are you sure you want to logout?')) {
                localStorage.removeItem('currentUser');
                window.location.href = 'index.html';
            }
        }
    </script>
</body>
</html>
