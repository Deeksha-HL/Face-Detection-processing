<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Citadel KYC - AI-Powered Identity Verification</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="login-page">
    <div class="login-wrapper">
        <!-- Left Panel - Form -->
        <div class="login-left-panel">
            <!-- Logo -->
            <div class="login-logo">
                <div class="logo-circle">🛡️</div>
                <span class="logo-name">Citadel</span>
            </div>

            <!-- Login Form -->
            <div id="login-form" class="auth-form active">
                <h1 class="form-title">Welcome Back!</h1>
                <p class="form-subtitle">Sign in to access your dashboard and continue optimizing your KYC process.</p>
                
                <form onsubmit="login(event)">
                    <div class="form-group">
                        <div class="input-wrapper">
                            <i class="fas fa-envelope input-icon"></i>
                            <input type="email" id="email" class="form-input" placeholder="Enter your email" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <div class="input-wrapper password-wrapper">
                            <i class="fas fa-lock input-icon"></i>
                            <input type="password" id="password" class="form-input" placeholder="Enter your password" required>
                            <button type="button" class="toggle-password" onclick="togglePasswordVisibility()">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>

                    <div class="form-options">
                        <label class="remember-me">
                            <input type="checkbox">
                            <span>Remember me</span>
                        </label>
                        <a href="#" class="forgot-password">Forgot Password?</a>
                    </div>

                    <button type="submit" class="btn-signin">Sign In</button>
                </form>

                <!-- Divider -->
                <div class="divider">
                    <span>OR</span>
                </div>

                <!-- Social Login -->
                <div class="social-login">
                    <button type="button" class="btn-social google" onclick="loginWithGoogle()">
                        <i class="fab fa-google"></i>
                        <span>Continue with Google</span>
                    </button>
                    <button type="button" class="btn-social apple" onclick="loginWithApple()">
                        <i class="fab fa-apple"></i>
                        <span>Continue with Apple</span>
                    </button>
                </div>

                <!-- Sign Up Link -->
                <p class="signup-prompt">
                    Don't have an account? <a href="#" onclick="switchAuthTab('register')">Sign Up</a>
                </p>
            </div>

            <!-- Register Form -->
            <div id="register-form" class="auth-form">
                <h1 class="form-title">Create Account</h1>
                <p class="form-subtitle">Join Citadel KYC to streamline your identity verification process.</p>
                
                <form onsubmit="register(event)">
                    <div class="form-group">
                        <div class="input-wrapper">
                            <i class="fas fa-user input-icon"></i>
                            <input type="text" id="reg-name" class="form-input" placeholder="Full Name" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <div class="input-wrapper">
                            <i class="fas fa-envelope input-icon"></i>
                            <input type="email" id="reg-email" class="form-input" placeholder="Email address" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <div class="input-wrapper password-wrapper">
                            <i class="fas fa-lock input-icon"></i>
                            <input type="password" id="reg-password" class="form-input" placeholder="Create password" required>
                            <button type="button" class="toggle-password" onclick="togglePasswordVisibility('reg-password')">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>

                    <div class="form-group">
                        <div class="input-wrapper password-wrapper">
                            <i class="fas fa-lock input-icon"></i>
                            <input type="password" id="reg-confirm" class="form-input" placeholder="Confirm password" required>
                            <button type="button" class="toggle-password" onclick="togglePasswordVisibility('reg-confirm')">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>

                    <button type="submit" class="btn-signin">Create Account</button>
                </form>

                <!-- Divider -->
                <div class="divider">
                    <span>OR</span>
                </div>

                <!-- Social Login -->
                <div class="social-login">
                    <button type="button" class="btn-social google" onclick="loginWithGoogle()">
                        <i class="fab fa-google"></i>
                        <span>Continue with Google</span>
                    </button>
                    <button type="button" class="btn-social apple" onclick="loginWithApple()">
                        <i class="fab fa-apple"></i>
                        <span>Continue with Apple</span>
                    </button>
                </div>

                <!-- Sign In Link -->
                <p class="signup-prompt">
                    Already have an account? <a href="#" onclick="switchAuthTab('login')">Sign In</a>
                </p>
            </div>
        </div>

        <!-- Right Panel - Promo -->
        <div class="login-right-panel" style="background: url('gradient-wallpaper-0025.png') no-repeat center center; background-size: cover;">
            <!-- Removed testimonial and features content -->
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        function switchAuthTab(tab) {
            document.getElementById('login-form').classList.remove('active');
            document.getElementById('register-form').classList.remove('active');
            
            if (tab === 'login') {
                document.getElementById('login-form').classList.add('active');
            } else {
                document.getElementById('register-form').classList.add('active');
            }
        }

        function togglePasswordVisibility(inputId = 'password') {
            const input = document.getElementById(inputId);
            const button = event.currentTarget;
            
            if (input.type === 'password') {
                input.type = 'text';
                button.innerHTML = '<i class="fas fa-eye-slash"></i>';
            } else {
                input.type = 'password';
                button.innerHTML = '<i class="fas fa-eye"></i>';
            }
        }

        function login(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            if (email && password) {
                // Mock login - in production, call your API
                localStorage.setItem('currentUser', JSON.stringify({
                    name: 'Devashishrana9002',
                    role: 'Compliance Officer',
                    email: email
                }));
                window.location.href = 'dashboard.html';
            }
        }

        function register(e) {
            e.preventDefault();
            const name = document.getElementById('reg-name').value;
            const email = document.getElementById('reg-email').value;
            const password = document.getElementById('reg-password').value;
            const confirm = document.getElementById('reg-confirm').value;
            
            if (password !== confirm) {
                alert('Passwords do not match!');
                return;
            }
            
            if (name && email && password) {
                // Mock register - in production, call your API
                localStorage.setItem('currentUser', JSON.stringify({
                    name: name,
                    role: 'Compliance Officer',
                    email: email
                }));
                window.location.href = 'dashboard.html';
            }
        }

        function loginWithGoogle() {
            alert('Google login coming soon!');
        }

        function loginWithApple() {
            alert('Apple login coming soon!');
        }
    </script>
</body>
</html>
